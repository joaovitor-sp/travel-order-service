; Xdebug configuration for development
xdebug.mode=debug
xdebug.start_with_request=yes
; Nginx -> FPM inside Docker: discovery resolves to Nginx container IP (wrong)
; Disable discovery and force client_host to the host machine
xdebug.discover_client_host=0
xdebug.client_host=host.docker.internal
xdebug.client_port=9003

; Optional: enable logs temporarily if still failing
xdebug.log=/var/www/storage/logs/xdebug.log
xdebug.log_level=7
